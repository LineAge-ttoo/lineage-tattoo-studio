<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LineAge — Herencia de San Agustín</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="loader"><span>SINTETIZANDO LEGADO...</span></div>
    
    <div class="fog-container">
        <div class="fog-layer"></div>
    </div>
    <canvas id="canvas-bg"></canvas>

    <div id="cursor"></div>
    <div id="cursor-aura"></div>

    <nav>
        <div class="nav-brand">LINEAGE</div>
        <div class="nav-menu">
            <button class="nav-btn active" data-section="home">Legado</button>
            <button class="nav-btn" data-section="engine">El Templo</button>
        </div>
    </nav>

    <main>
        <section id="home" class="view active">
            <div class="hero">
                <h2 class="pre-title">ARCHAEOLOGICAL RITUAL</h2>
                <h1 class="main-title">LINEAGE</h1>
                <div class="separator"></div>
                <p>La memoria de San Agustín tallada en la piel.</p>
            </div>
        </section>

        <section id="engine" class="view">
            <div class="engine-card">
                <h2>Generador Ancestral</h2>
                <div class="input-group">
                    <input type="text" id="promptInput" placeholder="Ej: Jaguar sagrado...">
                    <button id="btnGenerate">SINTETIZAR</button>
                </div>
                <div id="visualizer-3d"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
