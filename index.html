<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LINEAGE — Digital Ritual System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas-bg"></canvas>
    <div class="grain-overlay"></div>

    <nav>
        <div class="nav-brand">LINEAGE <span class="version">v2.2</span></div>
        <div class="nav-links">
            <button class="nav-btn active" data-section="hero">ORIGEN</button>
            <button class="nav-btn" data-section="archive">ARCHIVO</button>
            <button class="nav-btn" data-section="engine">TEMPLO</button>
        </div>
    </nav>

    <main id="smooth-wrapper">
        <section id="hero" class="v-section active">
            <div class="content">
                <h2 class="label">MUSEO ARQUEOLÓGICO VIRTUAL</h2>
                <h1 class="main-title">PIEL & PIEDRA</h1>
                <p class="manifesto-brief">El tatuaje no es decoración. Es la arquitectura de tu memoria tallada en el presente.</p>
            </div>
        </section>

        <section id="archive" class="v-section">
            <div class="archive-container">
                <div class="search-module">
                    <h3>CÓDICE DE ARQUETIPOS</h3>
                    <input type="text" id="searchInput" placeholder="Buscar símbolo (Ej: Jaguar, Sol...)">
                    <div id="searchResults" class="results-grid"></div>
                </div>
                
                <div class="styles-module">
                    <h3>MATRIZ DE ESTILOS LINEAGE</h3>
                    <div id="stylesGrid" class="styles-grid">
                        </div>
                </div>
            </div>
        </section>

        <section id="engine" class="v-section">
            <div class="engine-container">
                <div class="engine-header">
                    <h3>GENERADOR ANCESTRAL</h3>
                    <p id="selectedStyleDisplay">ESTILO ACTIVO: NINGUNO (Selecciona en el Archivo)</p>
                </div>
                <div class="input-ritual">
                    <input type="text" id="promptInput" placeholder="EJ: Resiliencia del Jaguar">
                    <button id="btnGenerate">INICIAR RITUAL</button>
                </div>
                <div id="result-display">
                    <div id="visualizer-output"></div>
                    <div id="hash-id"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="lineage-memory.js"></script>
    <script src="script.js"></script>
</body>
</html>
